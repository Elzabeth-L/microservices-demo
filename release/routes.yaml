apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: onlineboutique-gateway
spec:
  gatewayClassName: kgateway
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
spec:
  parentRefs:
  - name: onlineboutique-gateway
  rules:
  - matches:
    - path:
        type: Exact
        value: /
    - path:
        type: PathPrefix
        value: /product
    - path:
        type: Exact
        value: /cart
    - path:
        type: Exact
        value: /cart/empty
    - path:
        type: Exact
        value: /cart/checkout
    - path:
        type: Exact
        value: /setCurrency
    - path:
        type: Exact
        value: /logout
    - path:
        type: PathPrefix
        value: /static
    - path:
        type: Exact
        value: /robots.txt
    - path:
        type: Exact
        value: /_healthz
    backendRefs:
    - name: frontend
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: cartservice-route
spec:
  parentRefs:
  - name: onlineboutique-gateway
  rules:
  - matches:
    - method:
        service: hipstershop.CartService
        method: AddItem
    - method:
        service: hipstershop.CartService
        method: GetCart
    - method:
        service: hipstershop.CartService
        method: EmptyCart
    backendRefs:
    - name: cartservice
      port: 7070
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: recommendationservice-route
spec:
  parentRefs:
  - name: onlineboutique-gateway
  rules:
  - matches:
    - method:
        service: hipstershop.RecommendationService
        method: ListRecommendations
    backendRefs:
    - name: recommendationservice
      port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: productcatalogservice-route
spec:
  parentRefs:
  - name: onlineboutique-gateway
  rules:
  - matches:
    - method:
        service: hipstershop.ProductCatalogService
        method: ListProducts
    - method:
        service: hipstershop.ProductCatalogService
        method: GetProduct
    - method:
        service: hipstershop.ProductCatalogService
        method: SearchProducts
    backendRefs:
    - name: productcatalogservice
      port: 3550
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: shippingservice-route
spec:
  parentRefs:
  - name: onlineboutique-gateway
  rules:
  - matches:
    - method:
        service: hipstershop.ShippingService
        method: GetQuote
    - method:
        service: hipstershop.ShippingService
        method: ShipOrder
    backendRefs:
    - name: shippingservice
      port: 50051
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: currencyservice-route
spec:
  parentRefs:
  - name: onlineboutique-gateway
  rules:
  - matches:
    - method:
        service: hipstershop.CurrencyService
        method: GetSupportedCurrencies
    - method:
        service: hipstershop.CurrencyService
        method: Convert
    backendRefs:
    - name: currencyservice
      port: 7000
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: paymentservice-route
spec:
  parentRefs:
  - name: onlineboutique-gateway
  rules:
  - matches:
    - method:
        service: hipstershop.PaymentService
        method: Charge
    backendRefs:
    - name: paymentservice
      port: 50051
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: emailservice-route
spec:
  parentRefs:
  - name: onlineboutique-gateway
  rules:
  - matches:
    - method:
        service: hipstershop.EmailService
        method: SendOrderConfirmation
    backendRefs:
    - name: emailservice
      port: 5000
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: checkoutservice-route
spec:
  parentRefs:
  - name: onlineboutique-gateway
  rules:
  - matches:
    - method:
        service: hipstershop.CheckoutService
        method: PlaceOrder
    backendRefs:
    - name: checkoutservice
      port: 5050
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: adservice-route
spec:
  parentRefs:
  - name: onlineboutique-gateway
  rules:
  - matches:
    - method:
        service: hipstershop.AdService
        method: GetAds
    backendRefs:
    - name: adservice
      port: 9555
